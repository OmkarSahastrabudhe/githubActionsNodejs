name: first-workflow
on: push
jobs:
  job1:
    runs-on: ubuntu-latest 
    steps:
      - name: checkout-repository
        uses: actions/checkout@v3

      - name: installing node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: installing-dependencis
        run: npm ci 
      - name: runnning-tests
        run: npm test
        